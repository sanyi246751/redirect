<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在跳轉中...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
            color: #333;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="loader"></div>
    <h1 id="status">正在進行轉址，請稍候...</h1>

    <script>
        // 1. 請在 Google 試算表選擇「發布到網路」並選擇「定位字元分隔值 (.tsv)」
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzar9uJzMIZyy0d4dcictbUYb-MOZBiVG4x21TrMy06yDvqk4So4lcbY0VTPci-iugxv1L5r034hgr/pub?output=tsv';
        const defaultUrl = 'https://www.sanyi.gov.tw/';

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (id) {
            fetch(sheetUrl)
                .then(response => response.text())
                .then(data => {
                    // 使用 \t (Tab) 切割，避免網址內的逗號造成錯誤
                    const rows = data.split('\n').map(row => row.trim().split('\t'));
                    let foundUrl = null;

                    // 從第二列開始找 (i=1)
                    for (let i = 1; i < rows.length; i++) {
                        if (rows[i][0] === id) {
                            foundUrl = rows[i][1];
                            break;
                        }
                    }

                    window.location.href = foundUrl ? foundUrl : defaultUrl;
                })
                .catch(error => {
                    console.error('Error:', error);
                    window.location.href = defaultUrl;
                });
        } else {
            window.location.href = defaultUrl;
        }
    </script>
</body>

</html>
